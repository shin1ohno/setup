services:
  auth-proxy:
    build: ./auth-proxy
    restart: unless-stopped
    ports:
      - "8766:8766"
    # Container netns has its own resolver; LXC /etc/hosts is invisible.
    # OTLP exporter targets apm-server.home.local — without this, LAN DNS
    # outage (e.g. RTX SERVFAIL on home.local, see PR #390) breaks the
    # exporter at startup. Defense-in-depth alongside Tailscale split-DNS.
    # IP from contracts/devices.json apm-server entry (CT 116, IP .81).
    extra_hosts:
      - "apm-server.home.local:192.168.1.81"
    env_file:
      # Phase 5 APM env: OTEL_EXPORTER_OTLP_HEADERS holds the
      # ai-memory-auth-proxy-scoped ApiKey appended by generate_env.sh
      # at apply time. Endpoint + service-name + deployment-env are
      # plaintext under `environment:` below.
      - .env
    environment:
      - SAGE_ISSUER=https://mcp.ohno.be
      - SAGE_JWKS_URL=https://mcp.ohno.be/.well-known/jwks.json
      - UPSTREAM_URL=http://openmemory-api:8765
      - PORT=8766
      - PATH_PREFIX=/memory
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://apm-server.home.local:8200
      # Mount + reference the home APM Server CA cert so the OTLP gRPC
      # TLS handshake verifies against es_ca (not in OS roots). Without
      # this the SDK silently drops every batch with "TLS handshake
      # error: EOF" visible only in apm-server logs.
      - OTEL_EXPORTER_OTLP_CERTIFICATE=/etc/ssl/apm-ca.crt
      - OTEL_SERVICE_NAME=ai-memory-auth-proxy
      - DEPLOYMENT_ENVIRONMENT=home
    volumes:
      - ./apm-ca.crt:/etc/ssl/apm-ca.crt:ro
    depends_on:
      openmemory-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      default:
        aliases:
          - mem0_store
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  openmemory-api:
    image: mem0/openmemory-mcp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    env_file:
      - .env
    environment:
      - USER=${MEM0_USER:-shin1ohno}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ./patches/database.py:/usr/src/openmemory/app/database.py:ro
      - ./patches/mcp-server.py:/usr/src/openmemory/app/mcp_server.py:ro
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 1"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/docs')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  openmemory-ui:
    image: mem0/openmemory-ui:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8765
      - NEXT_PUBLIC_USER_ID=${MEM0_USER:-shin1ohno}
    depends_on:
      openmemory-api:
        condition: service_healthy

volumes:
  qdrant_data:
