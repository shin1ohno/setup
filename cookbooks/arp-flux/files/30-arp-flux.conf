# Suppress ARP flux on multi-NIC Linux hosts.
#
# Default arp_ignore=0 makes any local NIC reply to ARP requests for any
# IP configured anywhere on the host. With multiple NICs in the same
# /16 subnet (pro: enp11s0/enp12s0/enp25s0 in 192.168/16), this causes
# DHCP Address Conflict Detection to false-positive: NIC A asks "who
# has X.X.X.X?", NIC B (different MAC) replies "I do", and
# NetworkManager declares a conflict and releases the lease — every
# DHCP renewal cycle (~6 hours).
#
# arp_ignore=1: only reply to ARP requests for IPs configured on the
#               receiving interface
# arp_announce=2: always use the best local address for ARP source
#                 (avoids picking a non-routable address as the
#                 announced sender)
#
# Harmless on single-NIC hosts. Universally safe.
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.default.arp_announce = 2
