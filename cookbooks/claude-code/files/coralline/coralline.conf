# coralline config — managed by cookbooks/claude-code (setup repo).
# coralline pinned to commit 04808390 (2026-06-14). Local-only: no network/API.
# Deployed to ~/.claude/coralline.conf and sourced by ~/.claude/coralline/statusline.sh.

# Theme palette. Swap this single source line to change theme. Vendored themes
# (deployed by default.rb): claude-coral, nord. Others available upstream:
# catppuccin-mocha gruvbox-dark tokyo-night mono — vendor the matching
# themes/<name>.conf + add it to the default.rb theme list before using.
. "$HOME/.claude/coralline/themes/nord.conf"

VL_STYLE="pill"        # pill: powerline capsules · lean: flat colored text
VL_LAYOUT="auto"       # wrap into VL_MAX_LINES rows when the window narrows
VL_MAX_LINES=2
VL_CLOCK="24h"         # JST operation; coralline default is 12h
VL_NAME_MAX=0          # 0 = no truncation of branch/project names (show full)

# Segments. Claude Code 2.1.173's statusline JSON has NO `.rate_limits` field, so
# coralline's limit5h/limit7d never populate (dead weight) — dropped. Added
# project (stable repo name, survives git worktrees), lines, and duration, which
# map to fields Claude Code actually sends (.cost.total_lines_*, total_duration_ms)
# and fill the bar (coralline left-aligns; it has no right-justify/fill). ctx +
# cost render during active turns (.context_window.used_percentage / .cost.total_cost_usd;
# both null/0 at idle between turns).
VL_SEGMENTS="dir git project model ctx cost lines duration clock"
