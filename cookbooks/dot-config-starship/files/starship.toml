# Managed by mitamae: ~/ManagedProjects/setup/cookbooks/dot-config-starship/files/starship.toml
#
# Minimal partial override merged on top of Starship's built-in defaults.
# Only the keys set here change; everything else stays default.
#
# Why this file exists - prompt cursor desync inside tmux:
#   Several Starship modules default to a symbol built from a base glyph + the
#   VS16 emoji-presentation selector (U+FE0F), e.g. aws/gcloud/openstack use
#   "cloud + VS16". tmux measures such a grapheme as width 2, but zsh/zle
#   (glibc wcwidth) measures it as 1. That 1-column disagreement desyncs the
#   cursor, so zle's full-line redraw on tab-completion repaints from the wrong
#   column and doubles characters at the cursor.
#
#   zsh has no emoji-width setting (zsh-workers 2024, unresolved) and tmux's
#   width is not configurable, so the fix is at the prompt source: replace each
#   VS16-emoji symbol with a Nerd Font glyph (private-use codepoint). Those are
#   width 1 in BOTH glibc wcwidth and tmux (verified), matching the prompt's
#   other Nerd Font icons (git branch, etc.). Monochrome instead of color, but
#   width-consistent across zsh / tmux / Ghostty / Zed.
#
#   This overrides the FULL set of default modules whose symbol carries VS16
#   (found via `starship print-config`): aws, gcloud, openstack, cobol, nats,
#   nix_shell, shlvl. gcloud is the one that bit in practice (active account).
#
# Font requirement: a Nerd Font (SauceCodePro NFM, configured for Ghostty/Zed).

[aws]
symbol = "  "

[gcloud]
symbol = "  "

[openstack]
symbol = "  "

[cobol]
symbol = " "

[nats]
symbol = " "

[nix_shell]
symbol = "  "

[shlvl]
symbol = "  "
