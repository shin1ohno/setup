# Cookbook-managed override for elastic-agent.service.
#
# 1. EnvironmentFile= injects ELASTIC_AGENT_PASSWORD from the SSM-fetched env
#    file. systemd's EnvironmentFile= reads bare KEY=VALUE without shell
#    expansion, so passwords with metacharacters (parens, brackets, etc.) are
#    passed through literally — same pattern as lxc-elasticsearch.
#
# 2. Restart=on-failure + RestartSec=10 — recover from transient ES outages
#    (cluster restart, network blip) without operator intervention.
#
# 3. ProtectSystem / ProtectHome / PrivateTmp / NoNewPrivileges intentionally
#    omitted: Elastic Agent must read /var/log/syslog (filestream input) and
#    Privileged PVE LXCs (CT 100 roon) reject systemd namespace setup with
#    status=226/NAMESPACE — see ~/.claude/rules/pve-lxc.md
#    "Privileged PVE LXC — systemd unit hardening".
[Service]
EnvironmentFile=/etc/elastic-agent/elastic-agent.yml.env
Restart=on-failure
RestartSec=10
