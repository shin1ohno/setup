        username: elastic_agent_writer
        password: ${ELASTIC_AGENT_PASSWORD}
        scope: cluster
        period: 10s
        ssl:
          certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          verification_mode: full
        data_stream:
          type: metrics
          dataset: elasticsearch.stack_monitoring.enrich
      - metricsets: [ccr]
        hosts: ["https://es-0.home.local:9200", "https://es-1.home.local:9200", "https://es-2.home.local:9200"]
        username: elastic_agent_writer
        password: ${ELASTIC_AGENT_PASSWORD}
        scope: cluster
        period: 10s
        ssl:
          certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          verification_mode: full
        data_stream:
          type: metrics
          dataset: elasticsearch.stack_monitoring.ccr
      - metricsets: [pending_tasks]
        hosts: ["https://es-0.home.local:9200", "https://es-1.home.local:9200", "https://es-2.home.local:9200"]
        username: elastic_agent_writer
        password: ${ELASTIC_AGENT_PASSWORD}
        scope: cluster
        period: 10s
        ssl:
          certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          verification_mode: full
        data_stream:
          type: metrics
          dataset: elasticsearch.stack_monitoring.pending_tasks

  - type: kibana/metrics
    id: kibana-stack-monitoring
    use_output: default
    streams:
      - metricsets: [stats]
        hosts: ["http://kibana.home.local:5601"]
        username: elastic_agent_writer
