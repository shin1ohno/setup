  # Stack Monitoring integration — only enabled on hosts where
  # node[:elastic_agent][:enable_stack_monitoring_integration] == true.
  # Today that is CT 111 (lxc-monitoring) only — same centralized
  # collector-host topology as the Prometheus federation + Synthetics
  # integrations. A single standalone agent polls the whole ES cluster
  # (scope: cluster) plus Kibana, populating the
  # metrics-elasticsearch.stack_monitoring.* and
  # metrics-kibana.stack_monitoring.* data streams that back Kibana's
  # Stack Monitoring UI.
  #
  # REQUIRES kibana.yml `monitoring.ui.ccs.enabled: false` (set in
  # cookbooks/lxc-kibana/files/kibana.yml.tmpl) — the default `true` makes
  # the UI issue Cross Cluster Search queries that fail on this single
  # self-monitoring cluster (nodes lack remote_cluster_client), surfacing
  # as "Access Denied" even for the elastic superuser.
  #
  # AUTH: elastic_agent_writer carries the built-in remote_monitoring_collector
  # (ES _nodes/stats etc.) + monitoring_user (Kibana /api/stats, /api/status)
  # roles — granted in cookbooks/lxc-elasticsearch/files/bootstrap-init.sh.
  #
  # CONNECTION SETTINGS ARE PER-STREAM, NOT input-level. The standalone
  # agent does NOT inherit input-level hosts/username/password/ssl into the
  # metricbeat-style streams — an input-level-only `hosts:` yields
  # "host parsing failed: error parsing URL: empty host" and the component
  # goes FAILED/DEGRADED (observed 2026-06-07 first apply). The canonical
  # elastic/integrations stream.yml.hbs templates render these keys inside
  # each stream; mirror that here. Keep hosts/username/password/scope/
  # period/ssl on every stream on any future edit.
  #
  # The agent-native equivalent of metricbeat's `xpack.enabled: true` is the
  # per-stream `data_stream.dataset: <pkg>.stack_monitoring.<metricset>`
  # routing — do NOT add a literal `xpack.enabled` key here.
  #
  # Verification note: if data lands in metrics-elasticsearch.stack_monitoring.*
  # but the Stack Monitoring UI stays empty, re-check the dataset routing.

  - type: elasticsearch/metrics
    id: elasticsearch-stack-monitoring
    use_output: default
    streams:
      - metricsets: [cluster_stats]
        hosts: ["https://es-0.home.local:9200", "https://es-1.home.local:9200", "https://es-2.home.local:9200"]
        username: elastic_agent_writer
        password: ${ELASTIC_AGENT_PASSWORD}
        scope: cluster
        period: 10s
        ssl:
          certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          verification_mode: full
        data_stream:
          type: metrics
          dataset: elasticsearch.stack_monitoring.cluster_stats
      - metricsets: [node_stats]
        hosts: ["https://es-0.home.local:9200", "https://es-1.home.local:9200", "https://es-2.home.local:9200"]
        username: elastic_agent_writer
        password: ${ELASTIC_AGENT_PASSWORD}
        scope: cluster
        period: 10s
        ssl:
          certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          verification_mode: full
        data_stream:
          type: metrics
          dataset: elasticsearch.stack_monitoring.node_stats
      - metricsets: [index]
