# local-mcp: fully-local Cognee + OpenMemory MCP for the MacBook Air.
#
# Independent local data (NOT the home Aurora/RDS). All published ports are
# bound to 127.0.0.1 — Claude Code on this same host connects over loopback,
# so no network exposure and no app-layer auth are needed. Reads can still use
# the hosted mcp.ohno.be connectors; their WRITE tools are denied via Claude
# Code permissions (see cookbooks/local-mcp/default.rb).
#
# Connect targets for Claude Code:
#   cognee-local -> http://127.0.0.1:8002/mcp
#   memory-local -> http://127.0.0.1:8765/mcp
#
# ARM64 NOTE (Apple Silicon): before first apply, verify each image publishes a
# linux/arm64 manifest:
#   for img in pgvector/pgvector:pg16 qdrant/qdrant:latest cognee/cognee:0.5.8 \
#              cognee/cognee-mcp:latest mem0/openmemory-mcp:latest; do
#     echo "== $img =="; docker manifest inspect "$img" \
#       | jq -r '.manifests[]?.platform | "\(.os)/\(.architecture)"' 2>/dev/null || echo single-arch
#   done
# If a service's image has NO arm64 manifest, add `platform: linux/amd64` to
# that service (Docker Desktop Rosetta emulation; cognee is heavy → slow first
# import). The cognee/cognee-mcp:cpu local flatten from cookbooks/cognee is
# amd64-only and is intentionally NOT used here.
#
# RESOURCES: cognee is heavy. Set Docker Desktop > Resources > Memory >= 8GB
# (12GB recommended) or cognee may OOM on first import.
#
# PERSISTENCE: data lives in named volumes (pg_data/qdrant_data/cognee_data/
# cognee_system). `docker compose down` KEEPS them; NEVER `down -v` (destroys
# the local knowledge graph + memory store).

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_SUPER_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Runs ONLY on an empty pg_data volume (Postgres entrypoint convention).
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6334:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      default:
        aliases:
          - mem0_store
    healthcheck:
      # /dev/tcp is a bash builtin — must run under bash, not the CMD-SHELL
      # /bin/sh (dash), which errors "cannot create /dev/tcp/...: Directory
      # nonexistent" and marks the (healthy) container unhealthy. The qdrant
      # image ships /usr/bin/bash but no curl/wget/nc, so a bash TCP-connect is
      # the lightest readiness probe (6333 opens only once REST is serving).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cognee:
    image: cognee/cognee:0.5.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - ENVIRONMENT=local
      - LOG_LEVEL=INFO
      - CORS_ALLOWED_ORIGINS=*
      # Loopback-only API — no per-user access control needed locally.
      - ENABLE_BACKEND_ACCESS_CONTROL=false
      - COGNEE_SKIP_CONNECTION_TEST=true
      - GUNICORN_WORKERS=1
      - DB_PROVIDER=postgres
      - DB_NAME=cognee
      - DB_USERNAME=cognee
      - DB_PORT=5432
      - DB_HOST=postgres
      - DB_PASSWORD=${COGNEE_DB_PASSWORD}
    volumes:
      - cognee_data:/app/cognee/.data_storage     # kuzu graph + file storage
      - cognee_system:/app/cognee/.cognee_system
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s     # first boot runs alembic migrations (slower under emulation)

  cognee-mcp:
    image: cognee/cognee-mcp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=local
      - LOG_LEVEL=INFO
      - TRANSPORT_MODE=http
      - MCP_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - API_URL=http://cognee:8000
      # cognee API runs with ENABLE_BACKEND_ACCESS_CONTROL=false, so this token
      # is a harmless dummy (sent as X-Api-Key, ignored by the API). Present so
      # the image entrypoint's ${API_TOKEN} reference is never unbound.
      - API_TOKEN=${COGNEE_MCP_API_TOKEN}
    volumes:
      - ./patches/cognee-mcp-server.py:/app/src/server.py:ro
      - ./patches/cognee-mcp-client.py:/app/src/cognee_client.py:ro
    depends_on:
      cognee:
        condition: service_healthy

  openmemory-api:
    image: mem0/openmemory-mcp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    env_file:
      - .env
    environment:
      - USER=${MEM0_USER:-shin1ohno}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./patches/openmemory-database.py:/usr/src/openmemory/app/database.py:ro
      - ./patches/openmemory-mcp-server.py:/usr/src/openmemory/app/mcp_server.py:ro
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 1"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/docs')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  pg_data:
  qdrant_data:
  cognee_data:
  cognee_system:
