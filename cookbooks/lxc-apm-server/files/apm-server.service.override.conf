[Service]
# Secrets file — bare KEY=VALUE pairs (no shell expansion). Holds
# APM_SERVER_PASSWORD (ES apm_server_writer credential). Mode 0640
# root:apm-server — the Debian apt package installs the shipped unit
# with User=apm-server (verified on bookworm 2026-05-11), so the
# apm-server group must read this file.
EnvironmentFile=/etc/apm-server/apm-server-secrets.env

# NOTE on hardening directives:
#   ProtectSystem / ProtectHome / PrivateTmp / NoNewPrivileges are NOT
#   added. Per ~/.claude/rules/pve-lxc.md "Privileged PVE LXC — systemd
#   unit hardening directives fail with status=226/NAMESPACE", these
#   directives can break unit start inside privileged PVE LXCs. apm-server
#   LXC is currently unprivileged but we follow the fleet convention
#   (matches lxc-kibana / lxc-elasticsearch).

# Restart on any non-clean exit. apm-server's own healthcheck is via
# the /api/status endpoint (Phase 2 verification step uses this).
Restart=on-failure
RestartSec=10s
