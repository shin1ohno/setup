# Elasticsearch 8.x — single node of a 3-node cluster (es-0 / es-1 / es-2).
# The same compose spec ships to all three CTs (112/113/114); per-node
# divergence (NODE_NAME, TRANSPORT_HOST) is parameterised through .env
# substitutions and the bind-mounted elasticsearch.yml rendered by the
# cookbook.
#
# Phase 3b ships transport-TLS only (xpack.security.transport.ssl.enabled).
# HTTP-TLS is deferred to Phase 7-tls (separate PR). Cluster joins between
# nodes therefore require valid certs; LAN HTTP queries are basic-auth-only.
#
# Memory: heap is locked via bootstrap.memory_lock=true (configured in
# elasticsearch.yml). Container needs ulimits.memlock=-1 + cap_add IPC_LOCK,
# and the LXC itself needs lxc.cap.keep: ipc_lock (Phase 3a manual op).
# nofile is also raised — ES requires >=65536 (otherwise the node refuses
# to start with a bootstrap check failure).
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      # ES container reads node.name / cluster name from elasticsearch.yml
      # (bind-mounted below). The .env passes NODE_NAME for log clarity
      # and ES_JAVA_OPTS for heap tuning. Heap = -Xms5g -Xmx5g per ADR
      # §構成 (10 GB LXC alloc - 1 GB JVM overhead - 4 GB OS file cache).
      ES_JAVA_OPTS: "-Xms5g -Xmx5g"
    env_file:
      - .env
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add:
      - IPC_LOCK
    ports:
      # 9200 (HTTP) is reachable LAN-wide; the basic-auth gate is the
      # security boundary in Phase 3b. 9300 (transport) is also exposed
      # so peer ES nodes can join the cluster across LXC boundaries.
      - "9200:9200"
      - "9300:9300"
    volumes:
      - /data/elasticsearch/data:/usr/share/elasticsearch/data
      - /data/elasticsearch/logs:/usr/share/elasticsearch/logs
      - /data/elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      # Localhost basic-auth probe — ES password injected from .env.
      # `?wait_for_status=yellow` returns once the node has joined the
      # cluster and at least primary shards are allocated. `green`
      # requires replicas (= peer nodes joined) and would block on
      # bootstrap before es-1/es-2 are up.
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
