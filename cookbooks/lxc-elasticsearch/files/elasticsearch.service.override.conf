[Service]
# Memory locking — required for bootstrap.memory_lock=true in elasticsearch.yml.
# The DEB-installed unit ships LimitMEMLOCK=infinity already, but we re-state
# here so cookbook-managed override remains the source of truth.
LimitMEMLOCK=infinity

# File descriptor ceiling — ES bootstrap-check requires >=65536. The DEB unit
# default of 65535 fails the check on some templates; pin explicitly.
LimitNOFILE=65536

# Secrets file — bare KEY=VALUE pairs (no shell expansion). Replaces the
# docker-compose env_file: pattern that broke on metacharacter-bearing
# random_password output (Phase 3b retro: see ~/.claude/rules/pve-lxc.md
# "Docker-in-LXC vs apt+systemd").
EnvironmentFile=/etc/elasticsearch/elasticsearch-secrets.env

# Heap sizing — passed to the bundled JVM. -Xms == -Xmx per ES recommendation
# (5 GiB on a 10 GiB LXC, leaving 1 GiB JVM overhead + 4 GiB OS file cache).
# Also dropped as /etc/elasticsearch/jvm.options.d/heap.options for clarity;
# Environment= here is for completeness only (the jvm.options.d entry is
# the canonical knob).
Environment=ES_JAVA_OPTS="-Xms5g -Xmx5g"

# Bind-mount data dir — DEB default is /var/lib/elasticsearch but Phase 3a
# created /data/elasticsearch as the bind-mount target backed by the USB
# X8 SSD. The unit's PrivateTmp/ProtectSystem etc. are NOT used (see note
# below), so writing to /data/elasticsearch needs no extra ReadWritePaths
# either, but we declare it for clarity and future-proofing.
ReadWritePaths=/data/elasticsearch

# NOTE on hardening directives:
#   ProtectSystem / ProtectHome / PrivateTmp / NoNewPrivileges are NOT
#   added. Per ~/.claude/rules/pve-lxc.md "Privileged PVE LXC — systemd
#   unit hardening directives fail with status=226/NAMESPACE", these
#   directives break unit start inside privileged PVE LXCs. ES LXCs are
#   currently unprivileged but we follow node-exporter's fleet-wide
#   convention of omitting them (matches ~/.claude/rules/pve-lxc.md
#   "ship the unit without ... directives" guidance).

# Cluster-readiness gate (Stream E Phase 3b retro follow-up):
#   The bundled docker healthcheck (curl _cluster/health?wait_for_status=yellow)
#   returns 200 the moment the local node reaches yellow — even when 1
#   of 3 expected master-eligible peers has joined. This produced
#   publication-ack races during master election. ExecStartPost polls
#   _cat/nodes until all 3 expected nodes (es-0/1/2) are visible, only
#   then signalling `active` to systemd.
#
# TimeoutStartSec MUST be larger than wait-cluster-ready.sh's
# WAIT_TIMEOUT (default 300s). Set 600s for headroom on slow joins
# (cold-cluster scenario where peers are also booting).
TimeoutStartSec=600s
ExecStartPost=/usr/local/bin/es-wait-cluster-ready.sh
