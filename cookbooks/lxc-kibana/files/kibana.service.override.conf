[Service]
# Secrets file — bare KEY=VALUE pairs (no shell expansion). Replaces the
# docker-compose env_file: pattern. Mode 0640 root:kibana so the kibana
# system user (created by DEB postinst) can read it.
EnvironmentFile=/etc/kibana/kibana-secrets.env

# Node.js heap sizing — Kibana defaults are too low for production-like
# workloads with multiple visualizations open simultaneously. 1536 MiB
# matches the docker-era NODE_OPTIONS setting; the LXC has 4 GiB total.
Environment=NODE_OPTIONS=--max-old-space-size=1536

# State directories — Phase 3b plan put data + certs under /data/kibana
# (rpool, no bind-mount UID gymnastics). Native Kibana defaults to
# /var/lib/kibana for data; we override path.data in kibana.yml to use
# /data/kibana/data. ReadWritePaths is informational here (no
# ProtectSystem=strict, so all paths are RW by default).
ReadWritePaths=/data/kibana

# NOTE on hardening directives:
#   ProtectSystem / ProtectHome / PrivateTmp / NoNewPrivileges are NOT
#   added. Per ~/.claude/rules/pve-lxc.md "Privileged PVE LXC — systemd
#   unit hardening directives fail with status=226/NAMESPACE", these
#   directives can break unit start inside privileged PVE LXCs. Kibana
#   LXC is currently unprivileged but we follow the fleet convention
#   (matches node-exporter / lxc-elasticsearch).
