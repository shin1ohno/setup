# Lower the unprivileged-port boundary so non-root processes can bind UDP 514.
#
# Why: Promtail (lxc-monitoring docker stack) needs to receive RTX router
# syslog. RTX firmware (RTX1210 Rev.14, RTX830 Rev.15) only emits to the
# fixed default destination port 514; the `syslog host <ip> [<port>]`
# combined form is parsed by the device as multiple hosts (the second
# token becomes "host2" rather than a port specifier — see the GUI's
# "SYSLOG 宛先アドレス" page rendering 192.168.1.76 / 1514 as two IP rows).
#
# Promtail runs in an unprivileged docker container with network_mode: host
# inside an unprivileged PVE LXC. Without this sysctl it cannot bind <1024
# unless granted CAP_NET_BIND_SERVICE (avoidable). Lowering
# ip_unprivileged_port_start to 514 is per-LXC-namespace; it does not
# affect the PVE host or sibling LXCs.
net.ipv4.ip_unprivileged_port_start = 514
