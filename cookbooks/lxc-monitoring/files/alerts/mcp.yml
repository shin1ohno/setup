groups:
  - name: mcp-fleet
    interval: 30s
    rules:
      - alert: McpAuthFailing
        expr: mcp_probe_auth_success == 0
        for: 3m
        labels:
          severity: critical
          component: mcp
        annotations:
          summary: "MCP auth (Hydra client_credentials) failing for {{ $labels.server }}"
          description: |
            The monitoring-prober cannot obtain a Bearer token for {{ $labels.server }} via
            Hydra client_credentials grant. Either Hydra is down, the client registration is
            stale, or the prober credentials in SSM are wrong.
            Runbook: ssh root@192.168.1.10 'pct exec 106 -- curl -fsS http://localhost:4445/admin/clients/monitoring-prober'

      - alert: McpInitializeFailing
        expr: mcp_probe_initialize_success == 0
        for: 3m
        labels:
          severity: critical
          component: mcp
        annotations:
          summary: "MCP initialize handshake failing for {{ $labels.server }}"
          description: |
            Bearer auth succeeded but MCP `initialize` JSON-RPC failed. The server is
            up at the HTTP layer but the MCP protocol is broken (wrong audience, server
            crashed mid-handshake, version skew).

      - alert: McpUnusable
        expr: mcp_probe_e2e_success == 0
        for: 5m
        labels:
          severity: critical
          component: mcp
        annotations:
          summary: "MCP server {{ $labels.server }} is unusable end-to-end"
          description: |
            The full prober pipeline (auth -> SSE open -> initialize -> tools/list) failed
            for 5 minutes. Check the per-phase metrics on the MCP fleet health dashboard
            to find which step regressed.

      - alert: McpExternalEdgeUnreachable
        expr: probe_success{job="mcp-blackbox-external"} == 0
        for: 3m
        labels:
          severity: critical
          component: mcp-edge
        annotations:
          summary: "External MCP edge {{ $labels.instance }} unreachable"
          description: |
            blackbox_exporter cannot reach {{ $labels.instance }} from the home LAN. Likely
            causes (in order): EC2 nginx down, Tailscale subnet route unapproved (autoApprovers
            CIDR mismatch, see PR-A2), home internet egress blocked, DNS for mcp.ohno.be wrong.

      - alert: McpInternalBackendDown
        expr: probe_success{job="mcp-blackbox-internal"} == 0
        for: 2m
        labels:
          severity: warning
          component: mcp-backend
        annotations:
          summary: "Internal MCP backend {{ $labels.instance }} unreachable from monitoring LXC"
          description: |
            The LXC backend service is not responding on its bind port. Either the docker
            container is restarting, the cookbook's `ensure ... running` execute hasn't
            converged yet, or the host LXC is down.
