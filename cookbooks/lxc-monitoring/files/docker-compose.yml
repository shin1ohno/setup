# Monitoring stack for the LAN fleet:
#   - Prometheus (TSDB) scrapes node_exporter on each LXC + textfile metrics
#     written by auto-mitamae-orchestrator (Phase 2b)
#   - Grafana provisions the Prometheus datasource + bundled dashboards
#     (Node Exporter Full ID 1860 + auto-mitamae fleet view)
#
# Bind addresses: prometheus binds to 127.0.0.1 (LAN access goes through
# the LXC's public bind on grafana :3000 only). LAN-only — no public
# exposure in Phase 2; Tailscale public access via mcp-proxy is Phase 2c.
# 127.0.0.1 is sufficient because grafana queries prometheus over the
# docker-compose private network (service name resolution).
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      # Admin API enables /api/v1/admin/tsdb/{delete_series,clean_tombstones}
      # for surgically removing stale label sets (e.g. when a scrape target's
      # `instance` label changes after a config migration and old series
      # would otherwise persist for the full retention window). LAN-only
      # bind on 127.0.0.1:9090 makes the operational surface acceptable.
      - --web.enable-admin-api
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/alerts:ro
      - /data/monitoring/prometheus:/prometheus

  grafana:
    image: grafana/grafana:11.6.14
    container_name: monitoring-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Auth gate is the host firewall + LAN-only. Tailscale exposure (Phase
      # 2c) will switch to OAuth2-Proxy upstream of grafana.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - /data/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro

  # prometheus-pve-exporter polls PVE's API and exposes metrics in
  # Prometheus exposition format. Auth via a read-only API token
  # (prometheus@pve, role PVEAuditor) supplied through PVE_TOKEN_VALUE
  # in the .env file (sourced from SSM /monitoring/pve-exporter-token).
  #
  # The scrape config (prometheus.yml `pve` job) hits this exporter via
  # 127.0.0.1:9221/pve?target=<pve-host-ip>; relabel_configs sets the
  # `target` query param to the actual PVE host. LAN-only bind: 127.0.0.1
  # is sufficient since the only consumer is the sibling prometheus
  # container — no need to expose it on the LXC's network interface.
  pve-exporter:
    image: prompve/prometheus-pve-exporter:3.5.4
    container_name: monitoring-pve-exporter
    restart: unless-stopped
    environment:
      PVE_USER: prometheus@pve
      PVE_TOKEN_NAME: monitoring
      PVE_TOKEN_VALUE: ${PVE_TOKEN_VALUE}
      # PVE host's TLS cert is the auto-installer self-signed cert,
      # not in any system trust store. Verifying would need cookbookified
      # cert distribution (out of scope). The PVE host ↔ exporter path
      # stays inside the LAN + tailnet ACL, mTLS is over-engineering at
      # this stage.
      PVE_VERIFY_SSL: "false"
    ports:
      - "127.0.0.1:9221:9221"

  # blackbox_exporter probes external + internal HTTP endpoints. Used for
  # MCP fleet edge health (mcp.ohno.be/cognee/health, /memory/health, etc.)
  # and per-LXC backend reachability (192.168.1.x:port). Module config in
  # blackbox.yml; scrape targets defined in prometheus.yml's
  # `mcp-blackbox-{external,internal}` jobs via the standard target/relabel
  # pattern.
  #
  # Bound to 127.0.0.1 — the only consumer is the sibling prometheus
  # container, reached via service-name resolution `blackbox:9115` in
  # the docker-compose default network. No need to expose on LAN.
  blackbox:
    image: prom/blackbox-exporter:v0.26.0
    container_name: monitoring-blackbox
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yml
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    ports:
      - "127.0.0.1:9115:9115"
