apiVersion: 1

# Auto-provisioned Loki datasource for the RTX log dashboards. Same
# explicit-uid pattern as prometheus.yml — the rtx-logs.json dashboard
# references this datasource via {"uid": "loki"} and would otherwise hit
# Grafana's auto-generated random uid (panels render "No data").
datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    # Container-name resolution via the docker-compose default network.
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      timeout: 60
      maxLines: 5000
