apiVersion: 1

# Auto-provisioned datasource. Grafana reloads provisioned datasources on
# container start; edits in the UI are not persisted across container
# restarts (Grafana provisioning policy).
datasources:
  - name: Prometheus
    # Explicit uid so dashboard JSON refs ({"uid": "prometheus"}) bind to
    # this datasource on container start. Without this, Grafana auto-
    # generates a random uid (e.g. "PBFA97CFB590B2093") which the
    # checked-in dashboard JSON cannot reference, leaving every panel
    # with "No data".
    uid: prometheus
    type: prometheus
    access: proxy
    # Container-name resolution via the docker-compose default network.
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
