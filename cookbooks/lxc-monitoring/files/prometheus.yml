# Prometheus config for the home-LAN monitoring fleet.
#
# Phase 3a scrape targets: monitoring (self) + weave + 5 service LXC
# (hydra, consent, cognee, memory, roon-mcp) + bare-metal PVE host + PVE
# API exporter. Phase 3b/3c will expand to roon, samba, housekeeping,
# pro-dev, pro-router. Job names align with `host` label conventions used
# by auto-mitamae-orchestrator (Phase 2b) textfile metrics so PromQL
# queries can join across `host`.
#
# honor_labels: true — preserve `host` (and any other) labels emitted by
# the orchestrator/drift-checker textfile metrics instead of letting
# Prometheus rename them to `exported_host` due to collision with the
# scrape target's static label. Without this, dashboard queries that
# group by `host` fail because the orchestrator's host="monitoring" /
# host="weave" labels become exported_host="..." at scrape time, while
# the target's static label still wins on `host`.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node-monitoring
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.76:9100"
        labels:
          host: monitoring

  - job_name: node-weave
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.74:9100"
        labels:
          host: weave

  # Phase 3a service LXCs. Order: hydra → consent reflects the apply-time
  # dependency consent has on hydra's admin API (4445). cognee / memory /
  # roon-mcp have no apply-time deps on their siblings here.
  - job_name: node-hydra
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.71:9100"
        labels:
          host: hydra

  - job_name: node-consent
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.75:9100"
        labels:
          host: consent

  - job_name: node-cognee
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.70:9100"
        labels:
          host: cognee

  - job_name: node-memory
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.72:9100"
        labels:
          host: memory

  - job_name: node-roon-mcp
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.73:9100"
        labels:
          host: roon-mcp

  # Bare-metal PVE host (`pro` = 192.168.1.10) OS-level metrics.
  # node_exporter installed via cookbooks/node-exporter, included from
  # pve/pve-host.rb. Same systemd unit + textfile collector pattern as
  # CT 111 / CT 109 — appears in Node Exporter Full dashboard's host
  # selector as `host=pve-host`.
  - job_name: node-pve
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.10:9100"
        labels:
          host: pve-host

  # Proxmox-specific metrics (VM/CT counts, storage IO, cluster status,
  # backup history) via prometheus-pve-exporter (sibling container in
  # CT 111). Multi-target relabel pattern: the exporter listens on a
  # single address, the target query parameter selects which PVE node
  # to poll. Single PVE host today; expand `targets:` when adding a
  # second PVE node.
  #
  # Read-only auth via the PVE_TOKEN_VALUE env supplied to the exporter
  # (see docker-compose.yml `pve-exporter` service). Token comes from
  # SSM /monitoring/pve-exporter-token, populated out-of-band by the
  # operator with `pveum user token add prometheus@pve monitoring`.
  - job_name: pve
    metrics_path: /pve
    static_configs:
      - targets:
          - 192.168.1.10
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      # Prometheus runs in the same docker-compose project as pve-exporter;
      # use the service name (resolved by the compose default network),
      # NOT 127.0.0.1 — that points to the prometheus container itself,
      # not the LXC's loopback. Service-name resolution mirrors how the
      # grafana service reaches "prometheus:9090".
      - target_label: __address__
        replacement: pve-exporter:9221
