# Prometheus config for the home-LAN monitoring fleet.
#
# Phase 3b scrape targets: monitoring (self) + weave + Phase 3a 5 service
# LXC (hydra, consent, cognee, memory, roon-mcp) + Phase 3b 4 hosts
# (roon, samba, housekeeping, pro-dev) + bare-metal PVE host + PVE API
# exporter. Phase 3c will add pro-router. Job names align with `host`
# label conventions used by auto-mitamae-orchestrator (Phase 2b) textfile
# metrics so PromQL queries can join across `host`.
#
# honor_labels: true — preserve `host` (and any other) labels emitted by
# the orchestrator/drift-checker textfile metrics instead of letting
# Prometheus rename them to `exported_host` due to collision with the
# scrape target's static label. Without this, dashboard queries that
# group by `host` fail because the orchestrator's host="monitoring" /
# host="weave" labels become exported_host="..." at scrape time, while
# the target's static label still wins on `host`.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules — loaded from a bind-mounted directory inside the prometheus
# container (see docker-compose.yml `./alerts:/etc/prometheus/alerts:ro`).
# Each file is a `groups: [...]` document. Currently:
#   alerts/mcp.yml  — MCP fleet health (auth/initialize/e2e/edge unreachable)
rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: node-monitoring
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.76:9100"
        labels:
          host: monitoring

  - job_name: node-weave
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.74:9100"
        labels:
          host: weave

  # Phase 3a service LXCs. Order: hydra → consent reflects the apply-time
  # dependency consent has on hydra's admin API (4445). cognee / memory /
  # roon-mcp have no apply-time deps on their siblings here.
  - job_name: node-hydra
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.71:9100"
        labels:
          host: hydra

  - job_name: node-consent
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.75:9100"
        labels:
          host: consent

  - job_name: node-cognee
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.70:9100"
        labels:
          host: cognee

  - job_name: node-memory
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.72:9100"
        labels:
          host: memory

  - job_name: node-roon-mcp
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.73:9100"
        labels:
          host: roon-mcp

  # Phase 3b: Roon Server (CT 100), Samba (CT 101), housekeeping
  # personal-sync timers (CT 103), and the pro-dev SSH workspace (CT 104).
  # All apply-independent; no inter-host ordering at apply time.
  - job_name: node-roon
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.20:9100"
        labels:
          host: roon

  - job_name: node-samba
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.62:9100"
        labels:
          host: samba

  - job_name: node-housekeeping
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.63:9100"
        labels:
          host: housekeeping

  - job_name: node-pro-dev
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.64:9100"
        labels:
          host: pro-dev

  # Phase 3c: pro-router (CT 102) Tailscale subnet-router. Distinct from
  # the bare-metal PVE host's `node-pve` job further below.
  - job_name: node-pro-router
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.60:9100"
        labels:
          host: pro-router

  # nrt-subnet-router EC2 (AWS Tokyo, AL2023 arm64). Reached over
  # pro-router's Tailscale subnet route to AWS VPC (10.33.128.0/18) — see
  # tailscale-acl.tf:79-83 for the wildcard-port permit on
  # home_network_cidr -> vpc_cidr. node_exporter installed via
  # ~/ManagedProjects/home-monitor/scripts/tailscale-setup/04-node-exporter.sh
  # (Stage 1 user_data phase script).
  #
  # Target: nrt-router.home.local resolves via RTX1210 static record
  # (rtx_dns_server.main hosts block in home-monitor/rtx-hnd.tf, derived from
  # local.devices["nrt-router"].ip = aws_instance.tailscale.private_ip). EC2
  # recreation rotates the IP through Terraform → Route53 + RTX in the same
  # apply; DNS TTL refresh propagates to Prometheus's per-scrape resolver
  # without any cookbook re-apply or SSM round-trip.
  - job_name: node-nrt-router
    honor_labels: true
    static_configs:
      - targets:
          - "nrt-router.home.local:9100"
        labels:
          host: nrt-router

  # Bare-metal PVE host (`pro` = 192.168.1.10) OS-level metrics.
  # node_exporter installed via cookbooks/node-exporter, included from
  # pve/pve-host.rb. Same systemd unit + textfile collector pattern as
  # CT 111 / CT 109 — appears in Node Exporter Full dashboard's host
  # selector as `host=pve-host`.
  - job_name: node-pve
    honor_labels: true
    static_configs:
      - targets:
          - "192.168.1.10:9100"
        labels:
          host: pve-host

  # Proxmox-specific metrics (VM/CT counts, storage IO, cluster status,
  # backup history) via prometheus-pve-exporter (sibling container in
  # CT 111). Multi-target relabel pattern: the exporter listens on a
  # single address, the target query parameter selects which PVE node
  # to poll. Single PVE host today; expand `targets:` when adding a
  # second PVE node.
  #
  # Read-only auth via the PVE_TOKEN_VALUE env supplied to the exporter
  # (see docker-compose.yml `pve-exporter` service). Token comes from
  # SSM /monitoring/pve-exporter-token, populated out-of-band by the
  # operator with `pveum user token add prometheus@pve monitoring`.
  - job_name: pve
    metrics_path: /pve
    static_configs:
      - targets:
          - 192.168.1.10
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      # Prometheus runs in the same docker-compose project as pve-exporter;
      # use the service name (resolved by the compose default network),
      # NOT 127.0.0.1 — that points to the prometheus container itself,
      # not the LXC's loopback. Service-name resolution mirrors how the
      # grafana service reaches "prometheus:9090".
      - target_label: __address__
        replacement: pve-exporter:9221

  # MCP fleet health — external HTTP probes via blackbox_exporter.
  # The targets are the user-facing mcp.ohno.be paths each MCP server
  # exposes a healthcheck on. probe_success goes to 0 when the full
  # path (DNS -> EC2 nginx -> Tailscale subnet route -> LXC backend)
  # is broken — exactly the failure class that surfaced 2026-05-07
  # when the autoApprovers CIDR mismatch silently dropped EC2->LAN
  # traffic. The relabel pattern is the standard blackbox idiom:
  # turn each `target` into a Prometheus `instance` label and
  # rewrite the actual HTTP destination to the blackbox_exporter.
  - job_name: mcp-blackbox-external
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://mcp.ohno.be/cognee/health
          - https://mcp.ohno.be/memory/health
        labels:
          probe_class: edge
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Hydra OIDC discovery — separate job because the response body must
  # contain the OIDC discovery JSON keys (`issuer`, `token_endpoint`).
  # http_oidc_discovery module enforces the body regex.
  - job_name: mcp-blackbox-oidc
    metrics_path: /probe
    params:
      module: [http_oidc_discovery]
    static_configs:
      - targets:
          # Hydra's OIDC discovery endpoint is at /.well-known/...
          # (NOT /oauth2/.well-known/...). The /oauth2/* nginx location
          # proxies to Hydra's API endpoints (/oauth2/auth, /oauth2/token)
          # but discovery sits one path-level up — see the issuer JSON
          # itself for the canonical absolute URLs.
          - https://mcp.ohno.be/.well-known/openid-configuration
        labels:
          probe_class: oidc
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Roon-MCP exposes /.well-known/oauth-protected-resource as the
  # OAuth metadata endpoint. http_oauth_protected_resource module
  # enforces the body regex.
  - job_name: mcp-blackbox-oauth-meta
    metrics_path: /probe
    params:
      module: [http_oauth_protected_resource]
    static_configs:
      - targets:
          - https://mcp.ohno.be/roon/.well-known/oauth-protected-resource
        labels:
          probe_class: oauth-meta
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # MCP fleet health — internal LAN probes. Catch backend-only outages
  # (LXC docker-compose down) without involving the EC2 / Tailscale
  # stack. When external is red and internal is green, the network
  # path is broken; when both are red, the backend itself crashed.
  - job_name: mcp-blackbox-internal
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 192.168.1.70:8767
          - 192.168.1.72:8766
          - 192.168.1.73:8080
          - 192.168.1.74:8888
          - 192.168.1.71:4444
        labels:
          probe_class: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
