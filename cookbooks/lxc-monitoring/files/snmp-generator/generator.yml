# snmp_exporter generator config for YAMAHA RTX routers.
# Combines IF-MIB (interface bandwidth/errors/status) + YAMAHA-RT private MIB
# (CPU utilization, memory utilization, inbox temperature) + YAMAHA-RT-FIRMWARE
# (firmware revision). Run `make snmp.yml` to regenerate.
#
# Symbol prefixes:
#   yrh* — YAMAHA-RT-HARDWARE module (yrhCpuUtil*, yrhMemoryUtil, yrhInboxTemperature)
#   yrf* — YAMAHA-RT-FIRMWARE module (yrfRevision, yrfFirmwareFile)
# These are the actual names from the upstream MIB files (yamaha-rt-hardware.mib /
# yamaha-rt-firmware.mib). The plan's `yrh*Cpu5sec` etc. were placeholders;
# the canonical symbols are `yrhCpuUtil5sec` etc.
#
# `auths:` is at the top level (snmp_exporter v0.24+ schema). The community
# string is a placeholder substituted at deploy time by the cookbook from
# SSM /monitoring/rtx-snmp-community.
#
# Version 1 (not 2c): RTX1210 firmware Rev.14.01.42 does not respond to
# SNMPv2c against the global community. v1 works. See snmp.yml.tmpl note.

auths:
  rtx_v1:
    community: '@@RTX_SNMP_COMMUNITY@@'
    version: 1

modules:
  yamaha_rtx:
    walk:
      # SNMPv2-MIB: sysUpTime, sysName, sysContact, sysLocation
      - sysUpTime
      - sysName
      - sysContact
      - sysLocation
      # IF-MIB: interface table — bandwidth, errors, status
      - ifIndex
      - ifDescr
      - ifType
      - ifMtu
      - ifSpeed
      - ifAdminStatus
      - ifOperStatus
      - ifInDiscards
      - ifInErrors
      - ifOutDiscards
      - ifOutErrors
      # ifTable octet/packet counters (32-bit, RFC 1213). Both RTX1210 and
      # RTX830 expose these. RTX1210 firmware Rev.14.01.42 does NOT
      # implement ifXTable (RFC 2863) so HC 64-bit counters return empty;
      # we use the 32-bit ones uniformly to keep dashboards working on
      # both routers. Wrap risk: 4 GB at 1 Gbps wraps in ~34s — fine for
      # `rate()` queries with [5m] window provided traffic is averaged
      # well under line rate (home LAN is typically <100 Mbps).
      - ifInOctets
      - ifOutOctets
      - ifInUcastPkts
      - ifOutUcastPkts
      # ifXTable (HC 64-bit counters + ifName + ifHighSpeed). Walked
      # opportunistically — itm RTX830 fills these, hnd RTX1210 leaves
      # them empty. Dashboard prefers ifInOctets (always present).
      - ifName
      - ifHCInOctets
      - ifHCOutOctets
      - ifHCInUcastPkts
      - ifHCOutUcastPkts
      - ifHighSpeed
      # YAMAHA-RT-HARDWARE: CPU utilization (5sec / 1min / 5min averages),
      # memory utilization (%), inbox temperature.
      - yrhCpuUtil5sec
      - yrhCpuUtil1min
      - yrhCpuUtil5min
      - yrhMemoryUtil
      - yrhMemorySize
      - yrhMemorySizeMB
      - yrhInboxTemperature
      # YAMAHA-RT-HARDWARE multi-core CPU (yrhMultiCpuTable, OID .2.1.18):
      # per-core 5sec / 1min / 5min utilization, indexed by yrhMultiCpuIndex
      # and named by yrhMultiCpuName ("CPU0" / "CPU1"). Multi-core models
      # (RTX830) report CPU HERE and leave the scalar yrhCpuUtil* at 0;
      # single-core models (RTX1210) have no yrhMultiCpuTable. All
      # Gauge(0..100) integer percent — NOT scaled. The dashboard picks the
      # scalar for single-core and the per-core table for multi-core.
      - yrhMultiCpuName
      - yrhMultiCpuUtil5sec
      - yrhMultiCpuUtil1min
      - yrhMultiCpuUtil5min
      # YAMAHA-RT-FIRMWARE: firmware revision string + uptime.
      - yrfRevision
      - yrfFirmwareFile
      - yrfUpTime

    lookups:
      - source_indexes: [ifIndex]
        lookup: ifName
        drop_source_indexes: false
      # RTX firmware does NOT populate IF-MIB ifName (always empty string),
      # only ifDescr. Add ifDescr as a separate lookup so PromQL/dashboards
      # can filter by interface name (`ifDescr="LAN1"`). Both labels coexist
      # — ifName stays as an empty placeholder for forward compat with
      # devices that DO populate it.
      - source_indexes: [ifIndex]
        lookup: ifDescr
        drop_source_indexes: false
      # Per-core CPU label: map yrhMultiCpuIndex (1, 2, …) to the core name
      # (yrhMultiCpuName = "CPU0" / "CPU1") so the per-core util metrics carry
      # a readable `yrhMultiCpuName` label in addition to the numeric index.
      - source_indexes: [yrhMultiCpuIndex]
        lookup: yrhMultiCpuName
        drop_source_indexes: false

    overrides:
      ifAdminStatus:
        type: EnumAsStateSet
      ifOperStatus:
        type: EnumAsStateSet
      ifName:
        type: DisplayString
      sysName:
        type: DisplayString
      yrfRevision:
        type: DisplayString
      yrfFirmwareFile:
        type: DisplayString
      yrhMultiCpuName:
        type: DisplayString
