# Vector pipeline for RTX router syslog → Elasticsearch ingestion.
#
# Why Vector and not Promtail's syslog target:
#   RTX1210 Rev.14 / RTX830 Rev.15 firmware emit non-standard syslog —
#   `<PRI>tag msg` with no TIMESTAMP and no HOSTNAME. Both RFC5424 and
#   RFC3164 strict parsers (used by Promtail / Grafana Alloy via the same
#   leodido/go-syslog library) reject these packets at the timestamp
#   column, so Promtail records `parsing_errors_total` per packet and
#   forwards nothing. Vector's `socket` source ingests the raw UDP payload
#   and lets a VRL `remap` transform decode the format manually, with
#   wall-clock at receive time used for the event timestamp (LAN-local,
#   sub-ms latency relative to RTX-side event time).
#
# Phase 6 (ADR 0005): Loki sink + container removed. Elasticsearch is the
# sole sink for parsed RTX events; Kibana provides the analyst UI. The
# `parse` transform's structured fields (src/dst/severity/router/...)
# carry over unchanged into the ES document mapping.

# -----------------------------------------------------------------------------
# Global config
# -----------------------------------------------------------------------------

# Disk buffer root. Both [sinks.loki] and [sinks.elasticsearch] declare
# buffer.type = "disk" — Vector requires data_dir for disk-buffer storage.
# Bind-mounted from /data/monitoring/vector on the host (see
# cookbooks/lxc-monitoring/files/docker-compose.yml). Per-sink buffer
# subdirectories under data_dir/buffer/v2/<sink_id>/ are created by Vector
# at startup; the cookbook ensures the parent dir exists.
data_dir = "/var/lib/vector"

# -----------------------------------------------------------------------------
# Enrichment tables
# -----------------------------------------------------------------------------

# GeoIP via MaxMind/db-ip mmdb. Loaded once, queried per event from the
# `parse` VRL transform via get_enrichment_table_record.
# Vector 0.42+ removed the standalone `transforms.geoip`; lookups now go
# through the enrichment_tables API.
[enrichment_tables.dbip_city]
type = "mmdb"
path = "/etc/vector/geoip/dbip-city-lite.mmdb"

# -----------------------------------------------------------------------------
# Sources
# -----------------------------------------------------------------------------

[sources.rtx_udp]
type = "socket"
mode = "udp"
address = "0.0.0.0:514"
# .timestamp is auto-set to receive-time. .host is the sender IP. .message
# carries the raw UDP payload (RTX `<PRI>tag msg` text).
max_length = 4096

# Vector self-metrics for Prometheus scrape (replaces Promtail's :9080).
[sources.vector_metrics]
type = "internal_metrics"

# -----------------------------------------------------------------------------
# Transforms
# -----------------------------------------------------------------------------

# Decode RTX's <PRI>tag msg payload into structured fields.
[transforms.parse]
type = "remap"
inputs = ["rtx_udp"]
source = '''
  # Extract priority and remainder from RTX format: `<PRI>tag and message`.
  # Drop packets that don't start with <NN> (defensive — random UDP noise).
  m = parse_regex(.message, r'^<(?P<pri>\d+)>(?P<rest>.*)') ?? null
  if is_null(m) {
    abort
  }
  pri = to_int!(m.pri)
  sev_num = mod(pri, 8)
  fac_num = floor(pri / 8)
  .severity_num = sev_num
  .facility_num = fac_num

  # RFC 5424 Table 2 severity names; index by severity_num (0..7).
  # VRL requires integer literal for `[...]` indexing; use the `get`
  # function which accepts a runtime path.
  sev_names = ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
  .severity = get(sev_names, [sev_num]) ?? "unknown"

  # RFC 5424 Table 1 facility names — only local0..local7 of practical
  # interest for RTX (configured via `syslog facility local0`). Unknown
  # facilities fall through to the numeric value as a string.
  fac_names = {
    "0": "kern", "1": "user", "2": "mail", "3": "daemon",
    "4": "auth", "5": "syslog", "6": "lpr", "7": "news",
    "16": "local0", "17": "local1", "18": "local2", "19": "local3",
    "20": "local4", "21": "local5", "22": "local6", "23": "local7",
  }
  .facility = get(fac_names, [to_string(fac_num)]) ?? to_string(fac_num)

  # Replace .message with the post-PRI remainder so downstream regex
  # stages match against the RTX payload only.
  .message = m.rest

  # Map sender IP → device label + device_type. RTX routers: hnd .253 /
  # itm .254. WLX WiFi APs: wlx402 .5 / wlx323 .41. Drop everything else
  # defensively (random LAN devices mis-pointing syslog at this listener
  # should not produce labelled streams). device_type splits the two ES
  # sinks downstream (logs-rtx vs logs-wlx) and is del()'d before each sink.
  src_ip = .host
  if src_ip == "192.168.1.253" {
    .router = "hnd"
    .device_type = "router"
  } else if src_ip == "192.168.1.254" {
    .router = "itm"
    .device_type = "router"
  } else if src_ip == "192.168.1.5" {
    .device = "wlx402"
    .device_type = "ap"
  } else if src_ip == "192.168.1.41" {
    .device = "wlx323"
    .device_type = "ap"
  } else {
    abort
  }

  # Stage 1: RTX filter log structure (RTX1210 Rev.14 / RTX830 Rev.15).
  # Actual format observed in 2026-05 packet captures:
  #   "LAN2 Passed at IN(80) filter: TCP 35.79.199.237:443 > 192.168.1.76:49744"
  #   "LAN2 Passed at IN(80) filter: UDP 1.1.1.1:53 > 192.168.1.253:10707 (DNS response)"
  #   "PP[01] Rejected at OUT(200099) filter: ICMP 192.168.1.x > 192.168.1.y"
  # action_word is "Passed" or "Rejected"; normalize to PASS / REJECT to keep
  # the dashboard variable values stable.
  filter_re = r'^(?P<interface>\S+) (?P<action_word>Passed|Rejected) at (?P<direction>IN|OUT)\((?P<filter_no>\d+)\) filter: (?P<protocol>\w+) (?P<src>[\d.]+)(?::(?P<src_port>\d+))? > (?P<dst>[\d.]+)(?::(?P<dst_port>\d+))?'
  fr = parse_regex(.message, filter_re) ?? null
  if !is_null(fr) {
    .interface = fr.interface
    .direction = fr.direction
    .filter_no = fr.filter_no
    .action = if fr.action_word == "Passed" { "PASS" } else { "REJECT" }
    .protocol = fr.protocol
    .src = fr.src
    if exists(fr.src_port) { .src_port = fr.src_port }
    .dst = fr.dst
    if exists(fr.dst_port) { .dst_port = fr.dst_port }
  }

  # Stage 2: IKE / IPsec session events.
  #   "[IKE] initiate IPsec phase to 119.231.58.172"
  #   "[IKE2] SA:5/IKE established"
  #   "[IKE] respond ISAKMP phase to 1.2.3.4 (local address 5.6.7.8)"
  ike_re = r'\[(?P<phase>IKE2?)\] (?P<ike_event>.*?)(?: to (?P<peer>[\d.]+))?(?: \(local address (?P<local>[\d.]+)\))?$'
  ir = parse_regex(.message, ike_re) ?? null
  if !is_null(ir) {
    .phase = ir.phase
    .ike_event = ir.ike_event
    if exists(ir.peer) { .peer = ir.peer }
    if exists(ir.local) { .local = ir.local }
  }

  # Stage 3: DHCPD lease events.
  #   "[DHCPD] Extends 192.168.1.28: 24:59:e5:54:5e:5a"
  dhcp_re = r'\[DHCPD\] (?P<dhcp_event>Extends|Assigns|Releases) (?P<lease_ip>[\d.]+): (?P<mac>[0-9a-f:]+)'
  dr = parse_regex(.message, dhcp_re) ?? null
  if !is_null(dr) {
    .dhcp_event = dr.dhcp_event
    .lease_ip = dr.lease_ip
    .mac = dr.mac
  }

  # Stage 4: `same message repeated N times` collapse marker.
  rep_re = r'same message repeated (?P<repeat_count>\d+) times'
  rr = parse_regex(.message, rep_re) ?? null
  if !is_null(rr) {
    .repeat_count = rr.repeat_count
  }

  # Stage 5: GeoIP enrichment on the extracted filter-log src field.
  # Uses the `dbip_city` enrichment_table declared at the top of this
  # config (dbip-city-lite, CC-BY 4.0, monthly refresh by mitamae).
  # Vector's mmdb enrichment_table returns the raw MaxMind City-DB
  # nested structure (country.iso_code, city.names.en, location.latitude
  # etc.) — flatten the relevant fields to top-level so the downstream
  # Elasticsearch mapping resolves them as scalar fields (geo_point for
  # location, keyword for codes/names).
  # Wrapped in fallible-block style: `parse_regex` and `to_string` for
  # private/invalid IPs return errors that propagate via the `?? null`
  # pattern, leaving the geoip_* fields unset for those events.
  if exists(.src) {
    geoip_data, geoip_err = get_enrichment_table_record("dbip_city", { "ip": to_string!(.src) })
    if geoip_err == null && is_object(geoip_data) {
      .geoip_country_code = get(geoip_data, ["country", "iso_code"]) ?? null
      .geoip_country_name = get(geoip_data, ["country", "names", "en"]) ?? null
      .geoip_continent_code = get(geoip_data, ["continent", "code"]) ?? null
      .geoip_city_name = get(geoip_data, ["city", "names", "en"]) ?? null
      .geoip_latitude = get(geoip_data, ["location", "latitude"]) ?? null
      .geoip_longitude = get(geoip_data, ["location", "longitude"]) ?? null
      # subdivisions is an array; take the first entry (most-specific region).
      subdivs = array(get(geoip_data, ["subdivisions"]) ?? []) ?? []
      if length(subdivs) > 0 {
        first_sub = object(subdivs[0]) ?? {}
        .geoip_subdivision_code = get(first_sub, ["iso_code"]) ?? null
        .geoip_subdivision_name = get(first_sub, ["names", "en"]) ?? null
      }
    }
  }

  # ---------------------------------------------------------------------
  # WLX WiFi AP (WLX402 .5 / WLX323 .41) parsing. App-events-only per the
  # 2026-06-06 capture/cost decision: the kernel node-management churn and
  # the ROAMING_ASSIST RSSI spam are dropped. Both APs are Qualcomm-based;
  # .5 emits `<PRI>[MODULE] msg` (no space after PRI), .41 emits
  # `<PRI> [MODULE] <CODE> msg` (leading space) — strip_whitespace + the
  # optional <CODE> capture handle both. The RTX stages above never match
  # AP messages (different format), so they leave AP events untouched.
  if .device_type == "ap" {
    # `.message` is typed `string | null` (set from m.rest above), so calling
    # strip_whitespace/match/parse_regex on it directly is a fallible
    # assignment (VRL E103) and the running vector rejects the config — note
    # `vector validate --no-environment` does NOT build the topology and so
    # silently passes it. Coerce to a definite string ONCE so every downstream
    # use is infallible.
    msg = strip_whitespace(to_string(.message))
    .message = msg

    # Drop high-volume / low-value lines (kernel node mgmt, driver debug,
    # roaming RSSI comparisons).
    if match(msg, r'(node_cleanup|_ieee80211_free_node|ieee80211_sta_leave|_ieee80211_node_leave|station free|wmi_unified_|net_ratelimit|own address as source|\[0:I:ANY\])') {
      abort
    }
    if starts_with(msg, "[ROAMING_ASSIST]") {
      abort
    }

    # Module = first [..] bracket; optional numeric <CODE> after it.
    mm = parse_regex(msg, r'^\[(?P<module>[^\]]+)\]\s*(?P<after>.*)') ?? null
    if !is_null(mm) {
      .module = mm.module
      cm = parse_regex(mm.after, r'^<(?P<code>\d+)>') ?? null
      if !is_null(cm) {
        .code = cm.code
      }
    }

    # STA MAC: "STA (xx:..)" / "(xx:..)" or disconnect summary "(xx:..:auth=..)".
    # WLX MACs are already lowercase on the wire, so assign directly (downcase
    # on a string|null capture would be fallible).
    sta_m = parse_regex(msg, r'\((?P<sta>[0-9A-Fa-f:]{17})\)') ?? null
    if !is_null(sta_m) {
      .sta = sta_m.sta
    } else {
      sta_s = parse_regex(msg, r'\((?P<sta>[0-9A-Fa-f:]{17}):auth=') ?? null
      if !is_null(sta_s) {
        .sta = sta_s.sta
      }
    }

    # AP BSSID: "| AP <xx:..>".
    ap_m = parse_regex(msg, r'\| AP <(?P<ap>[0-9A-Fa-f:]{17})>') ?? null
    if !is_null(ap_m) {
      .ap = ap_m.ap
    }

    # Disassoc reason code.
    rc = parse_regex(msg, r'Reason Code: (?P<reason_code>\d+)') ?? null
    if !is_null(rc) {
      .reason_code = to_int(rc.reason_code) ?? null
    }

    # DHCP ([MON]): CLT:{mac} + YIP:{ip}.
    cmc = parse_regex(msg, r'CLT:\s*\{(?P<client_mac>[0-9A-Fa-f:]{17})\}') ?? null
    if !is_null(cmc) {
      .client_mac = cmc.client_mac
    }
    yip = parse_regex(msg, r'YIP:\s*\{(?P<client_ip>[\d.]+)\}') ?? null
    if !is_null(yip) {
      .client_ip = yip.client_ip
    }
  }
'''

# Elasticsearch-specific reshaping. Loki accepts everything as strings via
# its label/structured-metadata templating. Elasticsearch's data stream
# `logs-rtx-default` mapping (defined in lxc-elasticsearch cookbook, ADR
# 0005 Phase 3) is `dynamic: "strict"` and types specific fields:
#   *_port    -> integer (so range queries / sort-by-port work)
#   geoip_location -> geo_point (so Kibana Maps / geo aggregations work)
# This transform branches off `parse` so the Loki sink keeps its
# string-shaped fields untouched (no risk of breaking the existing
# rtx-logs.json Grafana dashboard during the dual-write window).
[transforms.parsed_rtx_for_es]
type = "remap"
inputs = ["parse"]
source = '''
  # Only RTX router events belong in logs-rtx; WLX AP events are routed to
  # the wlx sink instead. (2026-06-06)
  if .device_type != "router" {
    abort
  }
  # device_type is a routing helper, not part of the logs-rtx strict
  # mapping — drop it before the sink or the doc is rejected.
  del(.device_type)

  # Convert port fields to integer. Each is best-effort: when the field
  # is absent the to_int! call would error, so we gate on existence.
  # Use ?? null to keep events flowing on conversion failure rather than
  # aborting the whole event.
  if exists(.src_port) {
    .src_port = to_int(.src_port) ?? null
  }
  if exists(.dst_port) {
    .dst_port = to_int(.dst_port) ?? null
  }
  if exists(.peer_port) {
    .peer_port = to_int(.peer_port) ?? null
  }

  # Build geo_point object expected by ES `geo_point` mapping. The Loki
  # sink's templating consumes geoip_latitude / geoip_longitude as
  # separate string labels; ES wants {lat, lon} as a single object on
  # `geoip_location`. Drop the location object entirely if either
  # coordinate is absent (ES strict mapping rejects partial geo_point).
  if exists(.geoip_latitude) && exists(.geoip_longitude) {
    lat, lat_err = to_float(.geoip_latitude)
    lon, lon_err = to_float(.geoip_longitude)
    if lat_err == null && lon_err == null {
      .geoip_location = { "lat": lat, "lon": lon }
    }
  }
'''

# Shape WLX AP events for the logs-wlx-default strict mapping. Branches off
# `parse` (same as parsed_rtx_for_es) so the two ES sinks are independent.
# (2026-06-06)
[transforms.parsed_wlx_for_es]
type = "remap"
inputs = ["parse"]
source = '''
  # Only WLX AP events belong in logs-wlx; RTX router events go elsewhere.
  if .device_type != "ap" {
    abort
  }
  # Routing helper — not in the logs-wlx strict mapping.
  del(.device_type)
'''

# -----------------------------------------------------------------------------
# Sinks
# -----------------------------------------------------------------------------

# Phase 6 (ADR 0005): Loki sink removed. Elasticsearch is the sole sink for
# parsed RTX events; the `[sinks.elasticsearch]` block landed in Phase 4
# along with the `[transforms.parsed_rtx_for_es]` transform that shapes
# events for the `logs-rtx-default` data stream's strict mapping.

# Elasticsearch dual-write sink (ADR 0005 Phase 4). Active alongside
# [sinks.loki] during the 2-week observation window; Phase 6 removes the
# Loki sink after Kibana SLOs are confirmed. Both sinks consume from
# different transforms (`parse` → Loki string-shaped, `parsed_rtx_for_es`
# → ES typed) so failures in one path don't backpressure the other.
#
# Auth: basic-auth via auth.user / auth.password (NOT embedded in the
# endpoint URL — see Adversarial #6). ELASTIC_VECTOR_PASSWORD is read
# from the .env file (mode 0600, SSM-fetched at deploy time). The
# vector_writer ES role grants `monitor` cluster privilege + `write` on
# `logs-rtx-*` indices only.
#
# TLS: ADR-0005 Phase 3b ships ES with transport-only TLS
# (xpack.security.http.ssl.enabled = false). HTTP plain on :9200
# until Phase 7-tls flips http.ssl on with the same CA. Vector therefore
# uses http:// and no `tls = { ... }` block until then. When Phase 7-tls
# ships, flip endpoints back to https:// and uncomment the tls block;
# the bind-mount + cookbook fetch of /etc/vector/elastic-ca.crt is
# already in place to make that change a 3-line revert.
#
# Mode = "data_stream" routes to logs-rtx-default per ECS data-stream
# naming (type-dataset-namespace). The ILM policy logs-rtx-7d
# (defined in lxc-elasticsearch cookbook) handles rollover + 7-day
# delete; Vector does NOT manage the index template or ILM policy.
#
# Buffer: 1 GB disk cap, drop_newest on overflow. Slightly larger than
# Loki because the ES path has higher per-event overhead (JSON-typed
# payload) so transient ingest pauses can accumulate more events before
# the buffer drains.
[sinks.elasticsearch]
type = "elasticsearch"
inputs = ["parsed_rtx_for_es"]
endpoints = [
  "https://es-0.home.local:9200",
  "https://es-1.home.local:9200",
  "https://es-2.home.local:9200",
]
mode = "data_stream"
data_stream = { type = "logs", dataset = "rtx", namespace = "default" }
auth = { strategy = "basic", user = "vector_writer", password = "${ELASTIC_VECTOR_PASSWORD}" }
# Phase 7-tls: HTTPS to ES cluster. CA cert bind-mounted into the
# vector container at /etc/vector/elastic-ca.crt (cookbook fetches
# from SSM /monitoring/elastic/ca/cert).
tls = { ca_file = "/etc/vector/elastic-ca.crt", verify_certificate = true, verify_hostname = true }
buffer = { type = "disk", max_size = 1073741824, when_full = "drop_newest" }

# WLX WiFi AP syslog sink → logs-wlx-default data stream. Same ES cluster,
# same vector_writer credential (its role now grants write on logs-wlx-* too),
# same CA/TLS + disk buffer as the RTX sink. Separate data stream keeps the AP
# assoc/auth/roaming schema isolated from the RTX router schema. (2026-06-06)
[sinks.elasticsearch_wlx]
type = "elasticsearch"
inputs = ["parsed_wlx_for_es"]
endpoints = [
  "https://es-0.home.local:9200",
  "https://es-1.home.local:9200",
  "https://es-2.home.local:9200",
]
mode = "data_stream"
data_stream = { type = "logs", dataset = "wlx", namespace = "default" }
auth = { strategy = "basic", user = "vector_writer", password = "${ELASTIC_VECTOR_PASSWORD}" }
tls = { ca_file = "/etc/vector/elastic-ca.crt", verify_certificate = true, verify_hostname = true }
buffer = { type = "disk", max_size = 1073741824, when_full = "drop_newest" }

# Prometheus scrape endpoint for Vector self-metrics. Replaces Promtail's
# :9080. The lxc-monitoring stack's prometheus.yml job for the syslog
# pipeline targets localhost:9598/metrics.
[sinks.prometheus]
type = "prometheus_exporter"
inputs = ["vector_metrics"]
address = "0.0.0.0:9598"
