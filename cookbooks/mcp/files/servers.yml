# MCP Server Definitions
# =======================
# This file defines MCP servers that will be deployed to:
# - Claude Desktop: ~/Library/Application Support/Claude/claude_desktop_config.json
# - Codex CLI: ~/.codex/config.toml
#
# Environment Variables:
#   - Static values: use plain strings
#   - AWS SSM Parameters: use { ssm: "/path/to/parameter" }
#   - Shell environment: use { env: "ENV_VAR_NAME" }
#
# Variables:
#   - ${HOME} will be expanded to the user's home directory
#
# Desktop delivery of HTTP/SSE servers:
#   Claude Desktop's claude_desktop_config.json is stdio-only, so type:http
#   servers are NOT written there by default. Mark a server `desktop: mcp-remote`
#   to bridge it into the Desktop config as a local stdio entry
#   (`npx -y mcp-remote <url>`), making it usable in Desktop Chat WITHOUT an
#   account-level Custom Connector. Caveat: mcp-remote-bridged servers are
#   Desktop-Chat-only and are NOT visible in Cowork / claude.ai — those surfaces
#   only see account-synced Custom Connectors. Codex CLI always receives http
#   servers natively (type=http in config.toml), independent of this flag.

mcp_servers:
  obsidian-mcp-tools:
    command: "${HOME}/Library/Mobile Documents/iCloud~md~obsidian/Documents/notes/.obsidian/plugins/mcp-tools/bin/mcp-server"
    platforms:
      - darwin
    env:
      OBSIDIAN_API_KEY:
        ssm: "/mcp/obsidian-api-key"

  ai-memory:
    type: http
    # openmemory was patched to Streamable HTTP (cookbooks/lxc-memory patches/
    # mcp-server.py mounts streamable_http_app() at /mcp, removing the old
    # SSE-only routes). The endpoint is /memory/mcp (nginx strips the /memory
    # prefix → auth-proxy /mcp → openmemory-api). The legacy SSE path
    # /memory/mcp/claude/sse/shin1ohno no longer serves MCP — a client pinned to
    # it authenticates fine but then "Failed to connect" at the SSE handshake.
    # Mirror cognee: transport http against the /mcp endpoint.
    transport: http
    url: "https://mcp.ohno.be/memory/mcp"
    desktop: mcp-remote

  roon:
    type: http
    transport: sse
    url: "https://mcp.ohno.be/roon/sse"
    desktop: mcp-remote

  cognee:
    type: http
    # cognee is FastMCP streamable-HTTP only; it exposes /cognee/mcp, NOT /cognee/sse.
    # /cognee/sse 404s at the upstream (verified on CT 105 :8002). mcp-remote
    # auto-negotiates http-first against the /mcp endpoint.
    transport: http
    url: "https://mcp.ohno.be/cognee/mcp"
    desktop: mcp-remote
