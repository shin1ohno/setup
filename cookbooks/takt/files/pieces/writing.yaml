name: writing
description: 文書作成・校正ピース - Pyramid Principleで構造化し、限界効用で研ぎ澄ます
max_iterations: 8

personas:
  planner: ../personas/deep-research-planner.md
  writer: ../personas/document-writer.md
  editor: ../personas/marginal-utility-editor.md

initial_movement: plan

movements:
  - name: plan
    persona: writer
    edit: false
    instruction_template: |
      ## ピース状況
      - イテレーション: {iteration}/{max_iterations}
      - ムーブメント実行回数: {movement_iteration}
      - ムーブメント: plan

      ## タスク
      {task}

      ## エディターからのフィードバック（改稿の場合）
      {previous_response}

      ## 追加のユーザー入力
      {user_inputs}

      ## 指示
      タスクを分析し、以下を決定してください:

      **1. モード判定**
      - 「新規作成」: ゼロから文書を書く
      - 「校正・編集」: 既存の文章を改善する

      **2. Pyramid Principle に基づく構造設計**
      ```
      結論: [1文]
      ├── 根拠1: [要約]
      ├── 根拠2: [要約]
      └── 根拠3: [要約]
      ```

      **3. 想定読者と目的**
      - 誰が読むか
      - 読後にどうなってほしいか（意思決定、理解、行動）

      **4. 文書形式**
      - 短文（Slack/メール等）/ 中文（提案書等）/ 長文（Amazon式メモ）

      エディターからフィードバックがある場合は、指摘を反映した構造を再設計してください。
    rules:
      - condition: 構造設計が完了した
        next: write
      - condition: 情報が不足している
        next: ABORT

  - name: write
    persona: writer
    edit: false
    instruction_template: |
      ## ピース状況
      - イテレーション: {iteration}/{max_iterations}
      - ムーブメント実行回数: {movement_iteration}
      - ムーブメント: write

      ## 元のタスク
      {task}

      ## 構造設計 / 編集指示
      {previous_response}

      ## 追加のユーザー入力
      {user_inputs}

      ## 指示
      構造設計に従って文書を執筆してください。

      **執筆ルール:**
      1. 結論を最初に書く
      2. ナラティブ形式で書く（箇条書きは最小限）
      3. 形容詞・副詞を使わず、具体的な数字・事実を使う
      4. 各段落の冒頭にトピックセンテンスを置く
      5. 校正モードの場合は、元の文章の意図を保ちつつ改善する

      出力は完成原稿のみ。メタコメントは不要。
    rules:
      - condition: 執筆が完了した
        next: edit
      - condition: 執筆できない（情報不足）
        next: plan

  - name: edit
    persona: editor
    edit: false
    instruction_template: |
      ## ピース状況
      - イテレーション: {iteration}/{max_iterations}
      - ムーブメント実行回数: {movement_iteration}
      - ムーブメント: edit（限界効用エディティング）

      ## 元のタスク
      {task}

      ## ライターの原稿
      {previous_response}

      ## 指示
      限界効用の原理に基づいて原稿を編集してください。

      **編集プロセス:**

      1. **構造チェック（Pyramid Principle）**
         - 結論が冒頭にあるか
         - トピックセンテンスが各段落の先頭にあるか
         - 根拠がMECEにグルーピングされているか

      2. **限界効用テスト**
         - 各文について「削除しても文書の価値が下がらないか」を判定
         - 重複情報の排除
         - 読み手が既知の情報の排除

      3. **表現チェック**
         - 形容詞・副詞 → 数字・具体的事実
         - 曖昧表現 → 断定 or 不確実性の定量化
         - 受動態 → 能動態
         - 不要な箇条書き → ナラティブ

      **出力フォーマット:**

      まず編集レポートを出力:
      ```
      ## 編集レポート
      - 削除した文: N文（理由の要約）
      - 修正した表現: N箇所
      - 構造の変更: あり/なし
      - 品質判定: 承認 / 要改稿
      ```

      その後、編集済み原稿の全文を出力。
    rules:
      - condition: 品質が十分であり承認する
        next: COMPLETE
      - condition: 構造に問題があり改稿が必要
        next: plan

loop_monitors:
  - cycle: [plan, write, edit]
    threshold: 3
    judge:
      persona: editor
      instruction_template: |
        執筆サイクルが {cycle_count} 回繰り返されました。
        現時点の原稿で十分な品質か、これ以上の改稿は限界効用が低いか判断してください。
      rules:
        - condition: 現時点の品質で十分、または改善の限界効用が低い
          next: COMPLETE
        - condition: 重大な問題がありもう1サイクル必要
          next: plan
